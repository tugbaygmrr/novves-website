name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: VPS'e SSH ile bağlan ve deploy et
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 15m
          script_stop: true
          script: |
            set -e
            cd /home/ubuntu/novves-website
            git fetch origin main
            git reset --hard origin/main
            cd novves-main
            npm ci
            npm run build
            pm2 reload novves --update-env
            pm2 save
